spring:
  config:
    activate:
      on-profile: dev

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVER:kafka:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:management-service}

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgresql.postgresql.svc.cluster.local:5432/routex}
    username: ${SPRING_DATASOURCE_USERNAME:routex}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}

  security:
    user:
      name: ${SPRING_SECURITY_USER_NAME:admin}
      password: ${SPRING_SECURITY_USER_PASSWORD:admin}