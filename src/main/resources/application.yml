spring:
  application:
    name: go-routex-notify-processor

  threads:
    virtual:
      enabled: true

  kafka:
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1
        compression.type: gzip
        linger.ms: 10

    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "vn.com.*"
        spring.json.use.type.headers: false
        session.timeout.ms: 30000
        max.poll.records: 500

    events:
      route-ready-for-sale: "routex.route.ready-for-sale"
      route-assigned: "routex.route.assigned"
      notification-email: "routex.notification.email"
      notification-sms: "routex.notification.sms"
      # Any eventType starting with this prefix will be persisted as a recent activity.
      recent-activity-prefix: "routex.recent-activity"

    topics:
      routes: "route.management.event"
      booking: "route.bookings.event"
      activities: "recent.activities.event"

    group-id:
      routes: "route-service"
      bookings: "booking-service"
      payments: "payment-service"
      activities: "notify-processor-recent-activities"

    listener:
      ack-mode: manual

  datasource:
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    mapper:
      sort-properties-alphabetically: false

management:
  endpoint:
    health:
      probes:
        enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

server:
  port: ${SERVER_PORT:8085}

identity:
  jwt:
    secret: ${JWT_SECRET:CZZRadv0Xe8z3stWFWYdtiJ2E86gUgJvFEfbCYFgJhQ}
    issuer: ${JWT_ISSUER:user-service}
    audience: ${JWT_AUDIENCE:management-service}
    authority-claim-name: ${JWT_CLAIM_NAME:roles}
    authority-prefix: ${JWT_AUTH_PREFIX:ROLE_}

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.kafka: INFO
    org.apache.kafka: WARN
    org.hibernate.SQL: DEBUG
